<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Sunrise Detox Jeopardy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        /* --- GLOBAL STYLES --- */
        html, body {
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
            background-color: #000; /* Start black */
            height: 100dvh; 
            width: 100vw;
            overflow: hidden;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
            margin: 0;
            padding: 0;
        }

        /* Safe area handling for iPhones with notches */
        body {
            padding-top: max(env(safe-area-inset-top), 4px);
            padding-bottom: max(env(safe-area-inset-bottom), 4px);
            padding-left: env(safe-area-inset-left);
            padding-right: env(safe-area-inset-right);
            display: flex;
            flex-direction: column;
        }

        /* --- SPLASH SCREEN --- */
        #splash-screen {
            position: fixed;
            inset: 0;
            z-index: 300;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: #000;
            transition: opacity 1s ease;
        }

        /* --- INTRO OVERLAY --- */
        #intro-overlay {
            position: fixed;
            inset: 0;
            z-index: 200;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(to bottom, #020411, #1a0b16);
            transition: opacity 1.5s ease-in-out;
        }
        
        .run-sunrise-sky { animation: sky-change 4s ease-out forwards; }
        .run-sunrise-sun { animation: sunrise 4s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards; }
        .run-sunrise-text { animation: fade-in-text 2s ease-out forwards; animation-delay: 3s; }

        .sun-graphic {
            width: 150px;
            height: 150px;
            background: linear-gradient(to bottom, #fbbf24, #f59e0b);
            border-radius: 50%;
            box-shadow: 0 0 60px rgba(251, 191, 36, 0.6);
            position: relative;
            z-index: 10;
            transform: translateY(200%);
            opacity: 0;
        }

        .ocean {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 35%;
            background: linear-gradient(to top, #06226e, #1e3a8a);
            z-index: 20;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.5);
        }

        .intro-content {
            position: relative;
            z-index: 30;
            text-align: center;
            margin-top: -80px;
            opacity: 0;
            width: 90%;
        }

        @keyframes sunrise {
            0% { transform: translateY(200%); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }
        @keyframes sky-change {
            0% { background: linear-gradient(to bottom, #020411, #000000); }
            100% { background: linear-gradient(to bottom, #1e1b4b, #4c1d95); }
        }
        @keyframes fade-in-text {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* --- MENU SCREEN --- */
        #menu-screen {
            position: fixed;
            inset: 0;
            z-index: 50;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(to bottom, #000000, #064e3b);
            opacity: 0;
            transition: opacity 1s ease;
            overflow-y: auto; 
        }

        /* --- GAME CONTAINER --- */
        #game-container {
            display: none;
            flex-direction: column;
            height: 100%;
            width: 100%;
            opacity: 0;
            transition: opacity 1s ease-in;
            padding: 4px;
        }

        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
            margin-bottom: 4px;
            height: 40px;
        }

        /* --- MENU BUTTONS --- */
        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            width: 90%;
            max-width: 600px;
        }
        .menu-btn {
            width: 100%;
            padding: 15px;
            background-color: #16a34a; 
            color: white;
            font-weight: bold;
            font-size: clamp(0.8rem, 2vw, 1rem);
            border-radius: 8px;
            border: 2px solid #22c55e;
            box-shadow: 0 4px 6px rgba(0,0,0,0.4);
            text-align: center;
            transition: transform 0.1s;
        }
        .menu-btn:active { transform: scale(0.96); background-color: #15803d; }

        /* --- BOARD STYLES --- */
        .jeopardy-board {
            display: grid;
            grid-template-columns: repeat(5, minmax(0, 1fr));
            grid-template-rows: repeat(6, 1fr); 
            gap: 3px;
            flex-grow: 1;
            min-height: 0; 
            width: 100%;
        }
        
        .category-cell {
            background-color: #16a34a; 
            color: white;
            font-weight: bold;
            text-align: center;
            padding: 2px;
            font-size: clamp(0.7rem, 2.5vw, 1.1rem);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1.1;
            word-break: break-word; 
            hyphens: auto;
            overflow: hidden;
        }
        
        .question-cell {
            background-color: #16a34a; 
            color: #ffffff; 
            font-size: clamp(1.2rem, 6dvh, 2.5rem); 
            font-weight: 900;
            text-align: center;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid transparent;
        }
        .question-cell.answered {
            background-color: #000000; 
            color: #000000;
            cursor: not-allowed;
            pointer-events: none;
        }

        /* --- COMPACT SCOREBOARD --- */
        .scoreboard-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            margin-bottom: 4px;
            flex-shrink: 0; 
            height: 44px; 
        }
        .team-scoreboard {
            background-color: #ffffff;
            padding: 0 8px;
            border-radius: 6px;
            border: 3px solid transparent;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .team-scoreboard.active {
            border-color: var(--team-color, #3b82f6);
            box-shadow: 0 0 8px var(--team-color, #3b82f6);
            transform: scale(1.01);
        }
        .team-score {
            font-size: clamp(1.2rem, 4vw, 1.5rem);
            font-weight: 900;
            color: #064e3b;
            background: none;
            border: none;
            text-align: right;
            width: 70px;
            outline: none;
            margin: 0;
            pointer-events: auto; 
        }

        /* --- MODAL --- */
        .modal {
            display: none;
            position: fixed;
            z-index: 100;
            left: 0; top: 0;
            width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.95);
            align-items: center;
            justify-content: center;
            padding: 10px;
        }
        .modal-content {
            background-color: #fefefe;
            padding: 24px;
            border-radius: 12px;
            width: 98vw; 
            max-width: 98vw;
            height: 98dvh;
            max-height: 98dvh; 
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            text-align: center;
            overflow-y: auto;
        }
        .modal-question {
            font-size: clamp(2.5rem, 6vw, 4.5rem);
            font-weight: 900;
            color: #000000;
            padding: 20px 0;
            line-height: 1.3;
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 80px;
        }
        .modal-answer {
            display: none;
            font-size: clamp(2rem, 5vw, 3.5rem); 
            font-weight: 700;
            color: #059669;
            margin: 8px 0;
            padding: 15px;
            background: #d1fae5;
            border-radius: 8px;
            border: 1px solid #10b981;
        }

        /* --- UTILS --- */
        input[type="color"] { width: 20px; height: 20px; border: none; border-radius: 50%; padding: 0; overflow: hidden; }
        #scoring-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .game-btn { border-radius: 8px; padding: 12px; font-weight: bold; font-size: 1rem; color: white; }
    </style>
</head>
<body> 

    <div id="splash-screen">
        <h1 class="text-gray-400 text-sm tracking-[0.3em] uppercase mb-6">Sunrise Detox</h1>
        <button id="activate-app-btn" class="text-2xl font-bold text-white border-2 border-white px-8 py-4 rounded-full active:bg-white active:text-black transition-colors">
            ENTER EXPERIENCE
        </button>
    </div>

    <div id="intro-overlay">

            <p class="text-xs md:text-xl text-blue-200 tracking-[0.2em] uppercase font-semibold mb-8">Recovery Jeopardy</p>
            <button id="intro-btn" class="relative inline-flex items-center justify-center px-8 py-4 text-lg font-bold text-blue-900 bg-yellow-400 rounded-full hover:bg-yellow-300 active:scale-95 shadow-[0_0_20px_rgba(253,224,71,0.5)] transition-all">
                TAP TO START
            </button>
        </div>
    </div>

    <div id="menu-screen">

        <h1 class="text-2xl font-extrabold text-white text-center leading-tight mb-4">SELECT GAME</h1>
        
        <div class="menu-grid">

            <button onclick="startGame('game2', 'The Body & Detox')" class="menu-btn">Game 2:<br>The Body & Detox</button>
            <button onclick="startGame('game3', 'Famous Faces')" class="menu-btn">Game 3:<br>Famous Faces</button>

            <button onclick="startGame('game5', 'Life Skills')" class="menu-btn">Game 5:<br>Life Skills & Goals</button>
            <button onclick="startGame('game6', 'Emotions & Family')" class="menu-btn">Game 6:<br>Emotions & Family</button>
        </div>
    </div>

    <div id="game-container">
        <div class="header-bar">
             <button id="back-to-menu" class="bg-green-900 text-white text-[10px] font-bold py-2 px-3 rounded border border-green-500">

             </button>
             <div class="text-center flex-grow">
                 <h1 id="game-title-display" class="text-xs md:text-sm font-black text-white uppercase tracking-wide leading-tight truncate px-2">Relationships Edition</h1>

        <div class="scoreboard-container">

            </div>
            <div id="team-2-board" class="team-scoreboard" style="--team-color: #ef4444;">
                <div class="flex items-center gap-2 flex-1 min-w-0">
                    <input type="color" id="team-2-color" value="#ef4444">
                    <input type="text" id="team-2-name" class="font-bold text-gray-800 text-xs w-full bg-transparent outline-none truncate" value="Team 2">
                </div>
                <input type="number" id="team-2-score" class="team-score" value="0">
            </div>
        </div>

        <div id="jeopardy-board" class="jeopardy-board"></div>
    </div>

    <div id="question-modal" class="modal">
        <div class="modal-content">
            <div class="flex justify-between items-center border-b pb-2 mb-2">
                <span id="modal-category" class="text-xs font-bold text-green-600 uppercase tracking-wider truncate mr-2">Category</span>
                <span id="modal-points" class="text-2xl font-black text-yellow-600">$000</span>
            </div>
            
            <div id="modal-question-text" class="modal-question"></div>
            <div id="modal-answer-text" class="modal-answer"></div>

            <div class="mt-auto pt-2">
                <div class="flex items-center justify-center gap-4 mb-4">

                    <button id="timer-toggle-btn" class="w-10 h-10 bg-gray-200 rounded-full flex items-center justify-center active:bg-gray-300">

                    </button>
                </div>

                <div id="button-container">
                    <div id="scoring-buttons">
                        <button id="correct-btn" class="game-btn bg-green-500 active:bg-green-600">CORRECT</button>
                        <button id="incorrect-btn" class="game-btn bg-red-500 active:bg-red-600">WRONG</button>
                    </div>
                    <button id="next-btn" class="hidden w-full game-btn bg-blue-600 active:bg-blue-700">CONTINUE</button>
                </div>
            </div>
        </div>
    </div>

    <div id="daily-double-modal" class="modal">
        <div class="modal-content border-4 border-yellow-400 bg-green-950 text-white">

            </div>
            <button id="submit-wager-btn" class="game-btn w-full bg-yellow-400 text-green-900 hover:bg-yellow-300">BET!</button>
        </div>
    </div>

    <div id="winner-modal" class="modal">

            <h1 id="winner-name" class="text-5xl md:text-7xl font-black text-green-900 my-6">TEAM NAME</h1>
            <button id="close-winner-modal-btn" class="game-btn bg-green-900 text-white px-8 rounded-full shadow-2xl">NEW GAME</button>
        </div>
    </div>

    <div id="change-team-modal" class="modal">

            <p class="text-5xl font-black my-8" id="next-team-name">Team 2</p>
            <button id="confirm-change-team-btn" class="game-btn w-full bg-white text-green-700">READY</button>
        </div>
    </div>

        // --- AUDIO ENGINE ---
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let ac = null;

        function initAudio() {
            if(!ac) { ac = new AudioContext(); }
            if(ac.state === 'suspended') ac.resume();
        }

        function playSunriseSwell() {
            if(!ac) initAudio();
            const notes = [261.63, 329.63, 392.00, 523.25, 587.33];
            notes.forEach((f,i) => {
                const o=ac.createOscillator(), g=ac.createGain();
                o.type='sine'; o.frequency.value=f;
                o.connect(g); g.connect(ac.destination);
                g.gain.setValueAtTime(0, ac.currentTime+i*0.2);
                g.gain.linearRampToValueAtTime(0.05, ac.currentTime+i*0.2+0.05);
                g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime+i*0.2+4.0);
                o.start(ac.currentTime+i*0.2);
                o.stop(ac.currentTime+i*0.2+4.1);
            });
        }

        function playTimerSound() {
            if (!ac) return;
            if (timerOscillator) timerOscillator.stop();
            timerOscillator = ac.createOscillator();
            const gainNode = ac.createGain();
            timerOscillator.type = 'sine';
            if (tickTock % 2 === 0) { timerOscillator.frequency.setValueAtTime(1200, ac.currentTime); } 
            else { timerOscillator.frequency.setValueAtTime(800, ac.currentTime); }
            tickTock++;
            gainNode.gain.setValueAtTime(0.1, ac.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.05);
            timerOscillator.connect(gainNode);
            gainNode.connect(ac.destination);
            timerOscillator.start();
            timerOscillator.stop(ac.currentTime + 0.05);
        }

        function stopTimerSound() {
            if (timerOscillator) { timerOscillator.stop(); timerOscillator = null; }
            tickTock = 0;
        }

        function playDailyDoubleSound() {
            if (!ac) return;
            const osc = ac.createOscillator(), gain = ac.createGain();
            osc.type = 'sine'; osc.connect(gain); gain.connect(ac.destination);
            const now = ac.currentTime;
            gain.gain.setValueAtTime(0.3, now);
            osc.frequency.setValueAtTime(300, now);
            osc.frequency.exponentialRampToValueAtTime(800, now + 1);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 1.5);
            osc.start(now); osc.stop(now + 1.5);
        }

        function playCorrectSound() {
            if(!ac) return;
            const o=ac.createOscillator(), g=ac.createGain();
            o.type='square'; o.frequency.value=440;
            o.connect(g); g.connect(ac.destination);
            g.gain.setValueAtTime(0, ac.currentTime);
            g.gain.linearRampToValueAtTime(0.1, ac.currentTime+0.05);
            o.frequency.exponentialRampToValueAtTime(880, ac.currentTime+0.2);
            g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime+0.5);
            o.start(ac.currentTime); o.stop(ac.currentTime+0.5);
        }

        function playTimesUpSound() {
            if(!ac) return;
            const o=ac.createOscillator(), g=ac.createGain();
            o.type='sawtooth'; o.frequency.value=150;
            o.connect(g); g.connect(ac.destination);
            g.gain.setValueAtTime(0.1, ac.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime+0.5);
            o.start(ac.currentTime); o.stop(ac.currentTime+0.5);
        }

        function playStealSound() {
            if(!ac) return;
            const o=ac.createOscillator(), g=ac.createGain();
            o.type='sine'; o.frequency.value=600;
            o.connect(g); g.connect(ac.destination);
            g.gain.setValueAtTime(0, ac.currentTime);
            g.gain.linearRampToValueAtTime(0.1, ac.currentTime+0.05);
            o.frequency.linearRampToValueAtTime(400, ac.currentTime+0.3);
            g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime+0.5);
            o.start(ac.currentTime); o.stop(ac.currentTime+0.5);
        }

        function playBrassNote(freq, startTime, duration, vol) {
            const osc1 = ac.createOscillator(), osc2 = ac.createOscillator(), gainNode = ac.createGain();
            osc1.type = 'sawtooth'; osc2.type = 'square';
            osc1.frequency.value = freq; osc2.frequency.value = freq * 1.01;
            osc1.connect(gainNode); osc2.connect(gainNode);
            gainNode.connect(ac.destination);
            gainNode.gain.setValueAtTime(0, startTime);
            gainNode.gain.linearRampToValueAtTime(vol, startTime + 0.05);
            gainNode.gain.exponentialRampToValueAtTime(0.01, startTime + duration);
            osc1.start(startTime); osc2.start(startTime);
            osc1.stop(startTime + duration); osc2.stop(startTime + duration);
        }

        function playWinSound() {
            if(!ac) return;
            const now = ac.currentTime;
            playBrassNote(392.00, now, 0.4, 0.2);
            playBrassNote(523.25, now + 0.4, 0.4, 0.2);
            playBrassNote(659.25, now + 0.8, 0.4, 0.2);
            const impactTime = now + 1.2, vol = 0.12, duration = 1.2;
            playBrassNote(261.63, impactTime, duration, 0.3);
            playBrassNote(329.63, impactTime, duration, 0.25);
            playBrassNote(392.00, impactTime, duration, 0.25);
            playBrassNote(523.25, impactTime, duration, 0.2);
        }

        function playSelectSound() {
            if(!ac) return;
            const o=ac.createOscillator(), g=ac.createGain();
            o.type='triangle'; o.frequency.value=800;
            o.connect(g); g.connect(ac.destination);
            g.gain.setValueAtTime(0, ac.currentTime);
            g.gain.linearRampToValueAtTime(0.1, ac.currentTime+0.05);
            g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime+0.1);
            o.start(ac.currentTime); o.stop(ac.currentTime+0.15);
        }

        // --- GAME LOGIC ---
        ui.splashBtn.onclick = () => {

            ui.intro.style.display = 'flex';

            document.querySelector('.intro-content').classList.add('run-sunrise-text');

        }

        document.getElementById('intro-btn').onclick = () => {
            playSelectSound();
            ui.intro.style.opacity = 0;
            ui.menu.style.display = 'flex';
            setTimeout(() => {
                ui.intro.style.display = 'none';
                ui.menu.style.opacity = 1;
            }, 1000);
        };

        window.startGame = function(gameKey, title) {
            playSelectSound();
            activeGameData = ALL_GAMES[gameKey];
            ui.titleDisplay.textContent = title;
            ui.menu.style.opacity = '0';
            setTimeout(() => {
                ui.menu.style.display = 'none';
                ui.game.style.display = 'flex';
                setTimeout(() => ui.game.style.opacity = '1', 100);
            }, 500);
            resetGame();
        };

        document.getElementById('back-to-menu').onclick = () => {
            if(confirm("Exit to Menu?")) location.reload();
        };

        function resetGame() {
            team1Score = 0; team2Score = 0; answeredCount = 0;
            consecutiveCorrect1 = 0; consecutiveCorrect2 = 0;
            updateScoreUI();
            setActiveTeam(1);
            generateBoard();
        }
        document.getElementById('reset-game').onclick = () => {
            if(confirm("Reset current game scores and board?")) resetGame();
        };

        function setActiveTeam(num) {
            activeTeam = num;
            document.getElementById('team-1-board').classList.toggle('active', num===1);
            document.getElementById('team-2-board').classList.toggle('active', num===2);
        }

        function updateScoreUI() {
            document.getElementById('team-1-score').value = team1Score;
            document.getElementById('team-2-score').value = team2Score;
        }

        // Allow manual score editing
        document.getElementById('team-1-score').addEventListener('change', (e) => { team1Score = parseInt(e.target.value)||0; });
        document.getElementById('team-2-score').addEventListener('change', (e) => { team2Score = parseInt(e.target.value)||0; });

        function addScore(team, pts) {
            if(team===1) team1Score += pts; else team2Score += pts;
            updateScoreUI();
        }

        function generateBoard() {
            ui.board.innerHTML = '';
            const categories = Object.keys(activeGameData);
            
            categories.forEach(cat => {
                const div = document.createElement('div');
                div.className = 'category-cell';
                div.textContent = cat;
                ui.board.appendChild(div);
            });

            // Randomly select one cell as Daily Double
            const randomCat = categories[Math.floor(Math.random() * categories.length)];
            const randomPoints = [100, 200, 300, 400, 500][Math.floor(Math.random() * 5)];

            [100, 200, 300, 400, 500].forEach(points => {
                categories.forEach(cat => {
                    const btn = document.createElement('button');
                    btn.className = 'question-cell';
                    btn.textContent = `$${points}`;
                    const qData = activeGameData[cat][points];
                    const isDD = (cat === randomCat && points === randomPoints);

                    btn.onclick = () => {
                        if(btn.classList.contains('answered')) return;
                        playSelectSound();
                        btn.classList.add('answered');
                        btn.textContent = '';
                        answeredCount++;
                        
                        if(isDD) {
                            playDailyDoubleSound();
                            currentDD = qData;
                            ui.ddModal.style.display = 'flex';
                            document.getElementById('dd-wager-input').value = '';
                            document.getElementById('dd-wager-input').max = Math.max(activeTeam===1?team1Score:team2Score, 500);
                            document.getElementById('dd-wager-input').focus();
                        } else {
                            openQuestionModal(cat, `$${points}`, qData.q, qData.a);
                        }
                    };
                    ui.board.appendChild(btn);
                });
            });
        }

        function openQuestionModal(cat, pointsStr, q, a) {
            playSelectSound();
            originalTeam = activeTeam; // Remember who picked the question
            attemptState = 'initial';
            currentPoints = parseInt(pointsStr.replace('$', ''));
            
            document.getElementById('modal-category').textContent = cat;
            document.getElementById('modal-points').textContent = pointsStr;
            document.getElementById('modal-question-text').textContent = q;
            document.getElementById('modal-answer-text').textContent = a;
            
            document.getElementById('modal-answer-text').style.display = 'none';
            document.getElementById('scoring-buttons').style.display = 'grid';
            document.getElementById('next-btn').classList.add('hidden');
            
            ui.modal.style.display = 'flex';
            resetTimer(30);
            startTimer();
        }

        document.getElementById('submit-wager-btn').onclick = () => {
            const w = parseInt(document.getElementById('dd-wager-input').value);
            const max = parseInt(document.getElementById('dd-wager-input').max);
            if(!w || w < 5 || w > max) return;
            currentPoints = w;
            ui.ddModal.style.display = 'none';
            openQuestionModal(`DAILY DOUBLE`, `Wager: $${w}`, currentDD.q, currentDD.a);
            attemptState = 'dd';
        };

        // --- SCORING ---
        document.getElementById('correct-btn').onclick = () => {
            playCorrectSound();
            
            // Stealing team gets exact points now, not half
            addScore(activeTeam, currentPoints); 
            
            if(activeTeam===1) {
                consecutiveCorrect1++; consecutiveCorrect2=0;
            } else {
                consecutiveCorrect2++; consecutiveCorrect1=0;
            }
            revealAnswer(true);
        };

        document.getElementById('incorrect-btn').onclick = () => {
            if(attemptState === 'dd') {
                playTimesUpSound();
                addScore(activeTeam, -currentPoints);
                revealAnswer(false);
            } else if(attemptState === 'initial') {
                playTimesUpSound();
                // Original team guessed wrong: lose exact points
                addScore(activeTeam, -currentPoints);
                
                // Allow steal
                attemptState = 'steal';
                const next = activeTeam === 1 ? 2 : 1;
                setActiveTeam(next);
                resetTimer(5);
                startTimer();
            } else { 
                // Stealing team guessed wrong: NO points lost, turn goes back
                playTimesUpSound();
                setActiveTeam(originalTeam);
                revealAnswer(false);
            }
        };

        document.getElementById('next-btn').onclick = () => {
            ui.modal.style.display = 'none';
            const streakLimit = 2; // Pass turn after 2 correct answers in a row
            if(activeTeam===1 && consecutiveCorrect1 >= streakLimit) {
                consecutiveCorrect1=0; showTurnSwitch(2);
            } else if(activeTeam===2 && consecutiveCorrect2 >= streakLimit) {
                consecutiveCorrect2=0; showTurnSwitch(1);
            } else {
                if(answeredCount >= 25) showWinner();
            }
        };

        function showTurnSwitch(nextNum) {
            ui.changeTeamModal.style.display = 'flex';
            document.getElementById('next-team-name').textContent = document.getElementById(`team-${nextNum}-name`).value;
            document.getElementById('confirm-change-team-btn').onclick = () => {
                setActiveTeam(nextNum);
                ui.changeTeamModal.style.display = 'none';
                if(answeredCount >= 25) showWinner();
            };
        }

        function revealAnswer(correct) {
            stopTimer();
            document.getElementById('scoring-buttons').style.display = 'none';
            document.getElementById('next-btn').classList.remove('hidden');
            const ans = document.getElementById('modal-answer-text');
            ans.style.display = 'block';
            ans.style.color = correct ? '#059669' : '#dc2626';
            ans.style.backgroundColor = correct ? '#d1fae5' : '#fee2e2';
            ans.style.borderColor = correct ? '#10b981' : '#ef4444';
        }

        // --- TIMER TIMER ---
        function startTimer() {
            if(timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(timerTick, 1000);
            document.getElementById('timer-icon').innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>'; 
        }

        function stopTimer() {
            if(timerInterval) clearInterval(timerInterval);
            timerInterval = null;
            stopTimerSound();
            document.getElementById('timer-icon').innerHTML = '<path d="M8 5v14l11-7z"/>'; 
        }

        function resetTimer(seconds) {
            stopTimer();
            timeLeft = seconds;
            document.getElementById('timer-display').textContent = timeLeft;
        }

        function timerTick() {
            timeLeft--;
            document.getElementById('timer-display').textContent = timeLeft;
            if (timeLeft <= 0) {
                stopTimer();
                playTimesUpSound();
                
                if(attemptState === 'dd') {
                    addScore(activeTeam, -currentPoints);
                    revealAnswer(false);
                } else if(attemptState === 'initial') {
                    // Original team ran out of time: lose exact points
                    addScore(activeTeam, -currentPoints);
                    attemptState = 'steal';
                    const next = activeTeam === 1 ? 2 : 1;
                    setActiveTeam(next);
                    resetTimer(5); // 5 seconds for steal
                    startTimer();
                } else {
                    // Stealing team ran out of time: NO points lost, turn goes back
                    setActiveTeam(originalTeam);
                    revealAnswer(false);
                }
            } else {
                playTimerSound();
            }
        }
        document.getElementById('timer-toggle-btn').onclick = () => { if(timerInterval) stopTimer(); else startTimer(); };

        function showWinner() {
            playWinSound(); 
            ui.winnerModal.style.display = 'flex';
            let txt = "It's a Tie!";
            if(team1Score > team2Score) txt = document.getElementById('team-1-name').value;
            if(team2Score > team1Score) txt = document.getElementById('team-2-name').value;
            document.getElementById('winner-name').textContent = txt;
            const cont = document.getElementById('confetti-container');
            cont.innerHTML = '';
            const colors = ['#f00', '#0f0', '#00f', '#ff0', '#0ff'];
            for(let i=0; i<80; i++) {
                let c = document.createElement('div');
                c.style.cssText = `position:absolute; width:8px; height:8px; background:${colors[Math.floor(Math.random()*5)]}; top:-10px; left:${Math.random()*100}%; opacity:0.8; transition: top ${2+Math.random()*2}s ease-in, transform 3s linear;`;
                cont.appendChild(c);
                setTimeout(() => { c.style.top = '120%'; c.style.transform = `rotate(${Math.random()*360}deg)`; }, 50);
            }
        }
        document.getElementById('close-winner-modal-btn').onclick = () => location.reload();

        // Start coloring team scores dynamically based on the color picker
        document.getElementById('team-1-color').addEventListener('input', (e) => {
            document.getElementById('team-1-board').style.setProperty('--team-color', e.target.value);
        });
        document.getElementById('team-2-color').addEventListener('input', (e) => {
            document.getElementById('team-2-board').style.setProperty('--team-color', e.target.value);
        });
    </script>
</body>
</html>
