<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Sunrise Detox Jeopardy - Host Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        /* --- GLOBAL STYLES --- */
        html, body {
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
            background-color: #000;
            height: 100dvh; 
            width: 100vw;
            overflow: hidden;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            padding-top: max(env(safe-area-inset-top), 4px);
            padding-bottom: max(env(safe-area-inset-bottom), 4px);
            display: flex;
            flex-direction: column;
        }

        /* --- SCREENS --- */
        .screen {
            position: fixed;
            inset: 0;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 50;
            background: linear-gradient(to bottom, #000000, #064e3b);
        }

        /* --- SUNRISE INTRO THEME --- */
        #splash-screen { position: fixed; inset: 0; z-index: 300; display: flex; flex-direction: column; align-items: center; justify-content: center; background-color: #000; transition: opacity 1s ease; }
        #intro-overlay { position: fixed; inset: 0; z-index: 200; display: none; flex-direction: column; align-items: center; justify-content: center; background: linear-gradient(to bottom, #020411, #1a0b16); transition: opacity 1.5s ease-in-out; }
        
        .run-sunrise-sky { animation: sky-change 4s ease-out forwards; }
        .run-sunrise-sun { animation: sunrise 4s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards; }
        
        .sun-graphic { 
            width: 150px; height: 150px; 
            background: linear-gradient(to bottom, #fbbf24, #f59e0b); 
            border-radius: 50%; box-shadow: 0 0 60px rgba(251, 191, 36, 0.6); 
            position: relative; z-index: 10; transform: translateY(200%); opacity: 0; 
        }
        .ocean { 
            position: absolute; bottom: 0; width: 100%; height: 35%; 
            background: linear-gradient(to top, #06226e, #1e3a8a); z-index: 20; 
            box-shadow: 0 -10px 40px rgba(0,0,0,0.5); 
        }
        .intro-content { position: relative; z-index: 30; text-align: center; margin-top: -80px; opacity: 0; width: 90%; transition: opacity 1s ease; }
        
        @keyframes sunrise { 0% { transform: translateY(200%); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }
        @keyframes sky-change { 0% { background: linear-gradient(to bottom, #020411, #000000); } 100% { background: linear-gradient(to bottom, #1e1b4b, #4c1d95); } }

        /* --- MENU --- */
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 90%; max-width: 600px; }
        .menu-btn { padding: 15px; background-color: #16a34a; color: white; font-weight: bold; border-radius: 8px; border: 2px solid #22c55e; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .menu-btn:active { transform: scale(0.95); }

        /* --- GAME BOARD --- */
        #game-container { display: none; flex-direction: column; height: 100%; width: 100%; padding: 4px; }
        .jeopardy-board { display: grid; grid-template-columns: repeat(5, 1fr); grid-template-rows: repeat(6, 1fr); gap: 3px; flex-grow: 1; }
        
        .category-cell { 
            background-color: var(--board-theme, #1e3a8a); 
            filter: brightness(0.7);
            color: white; font-weight: bold; 
            text-align: center; font-size: clamp(0.6rem, 2vw, 0.9rem); 
            border-radius: 4px; display: flex; align-items: center; 
            justify-content: center; border: 1px solid rgba(255,255,255,0.2);
        }
        
        .question-cell { 
            background-color: var(--board-theme, #2563eb);
            color: #ffffff; font-size: clamp(1rem, 5dvh, 2rem); 
            font-weight: 900; text-align: center; border-radius: 4px; 
            display: flex; align-items: center; justify-content: center;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
            box-shadow: inset 0 0 10px rgba(0,0,0,0.3);
        }
        .question-cell.answered { 
            background-color: #000 !important; color: #111 !important; 
            pointer-events: none; box-shadow: none; text-shadow: none;
        }

        /* --- SCOREBOARD --- */
        .scoreboard-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(80px, 1fr)); gap: 4px; margin-bottom: 4px; }
        .team-scoreboard { 
            background-color: #fff; padding: 4px 4px; border-radius: 6px; 
            border: 4px solid transparent; 
            display: flex; flex-direction: column; justify-content: center; 
            transition: all 0.2s;
        }
        
        /* SOLID GREEN BACKGROUND FOR ACTIVE TEAM */
        .team-scoreboard.active { 
            background-color: #22c55e !important; 
            border-color: #15803d !important; 
            box-shadow: 0 0 15px #22c55e; 
            transform: scale(1.05); 
            z-index: 10;
        }
        .team-scoreboard.active .team-name-input,
        .team-scoreboard.active .team-score-input {
            color: #ffffff !important;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }
        
        /* Transparent Editable Inputs */
        .team-name-input { font-size: 0.65rem; font-weight: 800; color: #6b7280; background: none; border: none; outline: none; text-align: center; width: 100%; text-transform: uppercase; cursor: text; transition: color 0.2s; }
        .team-score-input { font-size: 1.2rem; font-weight: 900; color: #064e3b; text-align: center; width: 100%; background: none; border: none; outline: none; -moz-appearance: textfield; cursor: text; transition: color 0.2s; }
        .team-score-input::-webkit-outer-spin-button, .team-score-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

        /* --- MODALS --- */
        .modal { display: none; position: fixed; z-index: 100; inset: 0; background-color: rgba(0, 0, 0, 0.98); align-items: center; justify-content: center; }
        .modal-content { background-color: #fff; padding: 20px; border-radius: 12px; width: 95vw; height: 90dvh; display: flex; flex-direction: column; overflow-y: auto; }
        .modal-question { font-size: clamp(1.5rem, 5vw, 3rem); font-weight: 800; color: #000; flex-grow: 1; display: flex; align-items: center; justify-content: center; text-align: center; }
        .modal-answer-host { font-size: clamp(1.2rem, 4vw, 1.8rem); font-weight: 900; color: #059669; margin: 10px 0; padding: 15px; background: #d1fae5; border-radius: 8px; border: 3px dashed #10b981; text-align: center; }

        .game-btn { border-radius: 8px; padding: 15px; font-weight: bold; color: white; width: 100%; text-transform: uppercase; }
        .game-btn:active { transform: scale(0.95); }
    </style>
</head>
<body> 

    <div id="splash-screen">
        <h1 class="text-gray-400 text-sm tracking-[0.3em] uppercase mb-6">Sunrise Detox</h1>
        <button id="activate-app-btn" class="text-2xl font-bold text-white border-2 border-white px-8 py-4 rounded-full">ENTER EXPERIENCE</button>
    </div>

    <div id="intro-overlay">
        <div id="intro-sun" class="sun-graphic"></div>
        <div class="ocean"></div>
        <div id="intro-text" class="intro-content">
            <h1 class="text-3xl font-extrabold text-white tracking-wide mb-2"><span class="text-yellow-400">SUNRISE</span> DETOX</h1>
            <p class="text-xs text-blue-200 uppercase font-semibold mb-8">Recovery Jeopardy</p>
            <button id="intro-btn" class="px-8 py-4 text-lg font-bold text-blue-900 bg-yellow-400 rounded-full shadow-lg">TAP TO START</button>
        </div>
    </div>

    <div id="team-select-screen" class="screen">
        <button onclick="goBackToSplash()" class="absolute top-6 left-6 bg-gray-800 text-white text-xs py-2 px-4 rounded border border-gray-600">&larr; BACK</button>
        <div class="sun-graphic" style="opacity:1; transform:translateY(0); margin-bottom:20px;"></div>
        <h1 class="text-2xl font-black text-white mb-8">HOW MANY TEAMS?</h1>
        <div class="flex gap-4">
            <button onclick="setTeams(2)" class="menu-btn px-8">2</button>
            <button onclick="setTeams(3)" class="menu-btn px-8">3</button>
            <button onclick="setTeams(4)" class="menu-btn px-8">4</button>
        </div>
    </div>

    <div id="menu-screen" class="screen">
        <button onclick="showScreen('team-select-screen')" class="absolute top-6 left-6 bg-gray-800 text-white text-xs py-2 px-4 rounded border border-gray-600">&larr; BACK</button>
        <h1 class="text-xl font-extrabold text-white mb-6 mt-8 text-center">SELECT CATEGORY SET</h1>
        <div class="menu-grid" id="game-list"></div>
    </div>

    <div id="game-container">
        <div class="flex justify-between items-center mb-2 px-1">
            <button onclick="backToMenu()" class="bg-gray-800 text-white text-[10px] py-2 px-3 rounded border border-gray-600">&larr; MENU</button>
            <h2 id="current-game-title" class="text-white font-bold text-xs">GAME</h2>
            <div id="streak-info" class="text-[10px] text-yellow-400 font-bold uppercase">Streak: 0/2</div>
        </div>
       
        <div id="scoreboard" class="scoreboard-container"></div>
        <div id="jeopardy-board" class="jeopardy-board"></div>
    </div>

    <div id="daily-double-modal" class="modal">
        <div class="modal-content !bg-green-950 !text-white border-4 border-yellow-400">
            <h2 class="text-4xl font-black text-yellow-400 mb-6 text-center">DAILY DOUBLE</h2>
            <div class="mb-6 w-full">
                <label class="block text-white text-lg mb-2 text-center">Enter Wager:</label>
                <input type="number" id="dd-wager-input" class="text-4xl font-bold text-center w-full p-4 rounded-lg text-black" value="100">
            </div>
            <button id="submit-wager-btn" class="game-btn bg-yellow-400 text-green-950">PLACE BET</button>
        </div>
    </div>

    <div id="question-modal" class="modal">
        <div class="modal-content">
            <div class="flex justify-between items-center border-b pb-2">
                <span id="modal-category" class="text-xs font-bold text-green-600 uppercase">Category</span>
                <span id="modal-points" class="text-xl font-black text-yellow-600">$000</span>
            </div>
            
            <div id="modal-question-text" class="modal-question"></div>
            
            <div class="text-[10px] font-bold text-gray-400 uppercase text-center mt-2 tracking-widest">Host Answer Key:</div>
            <div id="modal-answer-text" class="modal-answer-host"></div>
            
            <div class="flex justify-center items-center gap-4 mt-2 mb-2">
                <div id="modal-timer" class="text-5xl font-black text-red-600">30</div>
                <button onclick="toggleTimer()" id="timer-btn" class="bg-gray-200 text-gray-800 px-4 py-2 rounded font-bold text-xs">PAUSE</button>
            </div>

            <div id="standard-actions" style="display: block;">
                <div class="grid grid-cols-2 gap-4">
                    <button onclick="handleCorrectAction()" class="game-btn bg-green-500">CORRECT</button>
                    <button onclick="processIncorrect()" class="game-btn bg-red-500">WRONG</button>
                </div>
                <button onclick="skipQuestion()" class="mt-4 text-gray-400 text-xs font-bold py-3 w-full text-center">SKIP (NO ONE GOT IT)</button>
            </div>

            <div id="award-actions" style="display: none;" class="flex-col gap-2 mt-2">
                <h3 class="text-sm font-bold text-center text-gray-600 uppercase mb-2">Timer Ended! Award Points To:</h3>
                <div id="award-team-buttons" class="grid grid-cols-2 gap-2"></div>
                <button onclick="cancelAwardSelection()" class="text-xs text-gray-400 mt-4 font-bold py-2 w-full">CANCEL / GO BACK</button>
            </div>

            <div id="steal-actions" style="display: none;" class="flex-col gap-2 mt-2">
                <h3 class="text-lg font-black text-center text-yellow-500 uppercase mb-2">STEAL OPPORTUNITY!</h3>
                <p class="text-xs text-center text-gray-500 mb-2">Select a team below if they wish to steal.</p>
                <div id="steal-team-buttons" class="grid grid-cols-2 gap-2"></div>
                <button onclick="skipSteal()" class="text-xs text-gray-400 mt-4 font-bold py-2 w-full border border-gray-200 rounded">NO ONE STEALS / SKIP</button>
            </div>

            <div id="steal-resolution" style="display: none;" class="flex-col gap-2 mt-2">
                <h3 id="steal-resolution-text" class="text-lg font-black text-center text-blue-600 uppercase mb-4">TEAM IS STEALING</h3>
                <div class="grid grid-cols-2 gap-4">
                    <button id="steal-correct-btn" class="game-btn bg-green-500">CORRECT (AWARD)</button>
                    <button id="steal-wrong-btn" class="game-btn bg-red-500">WRONG (DEDUCT)</button>
                </div>
                <button id="steal-cancel-btn" class="text-xs text-gray-400 mt-4 font-bold py-2 w-full">CANCEL / BACK TO STEAL MENU</button>
            </div>
        </div>
    </div>

    <div id="winner-modal" class="modal">
        <div class="modal-content bg-yellow-400 justify-center items-center">
            <h2 class="text-green-900 font-bold">CONGRATULATIONS</h2>
            <h1 id="winner-name" class="text-4xl font-black text-green-900 my-6 text-center">TEAM</h1>
            <button onclick="location.reload()" class="game-btn bg-green-900">PLAY AGAIN</button>
        </div>
    </div>

                "Sober Living": { 100: { q: "The rule dictating what time you must be back at the house.", a: "What is Curfew?" }, 200: { q: "Attending these is usually mandatory in sober living.", a: "What are House Meetings/12-Step Meetings?" }, 300: { q: "Doing these contributes to the cleanliness of the shared space.", a: "What are Chores?" }, 400: { q: "Testing done randomly to ensure residents are clean.", a: "What are Drug Screens / UAs?" }, 500: { q: "First financial responsibility you take on in sober living.", a: "What is Rent?" } },
                "Routine": { 100: { q: "Making this every morning is a suggested first small win.", a: "What is Your Bed?" }, 200: { q: "Eating regular meals helps prevent this H.A.L.T. trigger.", a: "What is Hunger?" }, 300: { q: "Getting 7-9 hours of this is crucial for brain healing.", a: "What is Sleep?" }, 400: { q: "Taking time daily to list things you are thankful for.", a: "What is a Gratitude List?" }, 500: { q: "Setting aside 10 minutes for mindfulness or deep breathing.", a: "What is Meditation?" } },
                "Finances": { 100: { q: "A plan for how you will spend your money each month.", a: "What is a Budget?" }, 200: { q: "Money kept aside for unexpected expenses.", a: "What is an Emergency Fund?" }, 300: { q: "A score that dictates your ability to borrow money.", a: "What is a Credit Score?" }, 400: { q: "Paying yourself first means putting money here.", a: "What is Savings?" }, 500: { q: "The trap of spending more as you earn more.", a: "What is Lifestyle Creep?" } },
                "Goals": { 100: { q: "S.M.A.R.T. stands for Specific, Measurable, Achievable, Relevant, and ______.", a: "What is Time-bound?" }, 200: { q: "Writing goals down makes you more likely to ______ them.", a: "What is Achieve?" }, 300: { q: "Breaking a large goal into smaller pieces.", a: "What are Milestones / Baby Steps?" }, 400: { q: "A visual representation of your goals and dreams.", a: "What is a Vision Board?" }, 500: { q: "Reviewing your goals to see if they still fit your life.", a: "What is Re-evaluating?" } },
                "Employment": { 100: { q: "A document summarizing your work experience.", a: "What is a Resume?" }, 200: { q: "Practicing this helps you prepare for a job meeting.", a: "What is an Interview?" }, 300: { q: "Showing up to work on time and sober shows ______.", a: "What is Reliability?" }, 400: { q: "A professional network platform.", a: "What is LinkedIn?" }, 500: { q: "Leaving a job gracefully involves giving a two-week ______.", a: "What is Notice?" } }
            }},
            "game6": { "title": "Emotions & Family", "data": {
                "Fear": { 100: { q: "Acronym for F.E.A.R.: False Evidence Appearing ______.", a: "What is Real?" }, 200: { q: "Fear of this keeps people from trying new things.", a: "What is Failure?" }, 300: { q: "The antidote to fear is often said to be this.", a: "What is Faith?" }, 400: { q: "Fear of success can lead to this behavior.", a: "What is Self-Sabotage?" }, 500: { q: "Courage is not the absence of fear, but acting ______ it.", a: "What is Despite it?" } },
                "Rejection": { 100: { q: "Rejection triggers feelings of not being 'good ______'.", a: "What is Enough?" }, 200: { q: "A 'no' is not a reflection of your personal ______.", a: "What is Worth?" }, 300: { q: "Thinking error assuming someone is judging you negatively.", a: "What is Mind Reading?" }, 400: { q: "Rejection can be seen as ______ to a better path.", a: "What is Redirection/Protection?" }, 500: { q: "Building this trait helps you bounce back from rejection.", a: "What is Resilience?" } },
                "Parenting": { 100: { q: "Setting these helps children feel safe and know rules.", a: "What are Boundaries?" }, 200: { q: "Listening to your child without interrupting.", a: "What is Active Listening?" }, 300: { q: "Having a stable routine creates a sense of ______.", a: "What is Safety?" }, 400: { q: "It is okay to say 'I don't ______' to your child's question.", a: "What is Know?" }, 500: { q: "Modeling healthy ______ coping is better than hiding emotions.", a: "What is Emotional?" } },
                "Amends": { 100: { q: "A simple 'I'm sorry' is an apology; changed behavior is an ______.", a: "What is Amends?" }, 200: { q: "Showing up and doing the right thing consistently.", a: "What are Living Amends?" }, 300: { q: "Financial amends involves paying back ______.", a: "What is Money?" }, 400: { q: "Before making amends, you should consult your ______.", a: "What is Sponsor?" }, 500: { q: "The purpose of amends is to clean your side of the ______.", a: "What is Street?" } },
                "Grief": { 100: { q: "The first stage of grief, often characterized by disbelief.", a: "What is Denial?" }, 200: { q: "Intense feelings of sorrow and loss.", a: "What is Sadness/Depression?" }, 300: { q: "Feeling responsible for the loss or thinking 'what if'.", a: "What is Guilt?" }, 400: { q: "The final stage of grief, making peace with the reality.", a: "What is Acceptance?" }, 500: { q: "Grief is not a straight line, it is non-______.", a: "What is Linear?" } }
            }}
        };

        let gameState = {
            numTeams: 2,
            currentTeam: 0,
            teamNames: ["TEAM 1", "TEAM 2", "TEAM 3", "TEAM 4"],
            scores: [0, 0, 0, 0],
            correctCount: 0,
            answeredTotal: 0,
            totalQuestions: 25,
            dailyDoubles: [],
            currentCell: null,
            currentValue: 0
        };

        const teamColors = ['#3b82f6', '#ef4444', '#eab308', '#a855f7'];
        const uniformThemes = ['#dc2626', '#ea580c', '#ca8a04', '#65a30d', '#16a34a', '#0d9488', '#0284c7', '#2563eb', '#4f46e5', '#7c3aed', '#c026d3', '#e11d48'];

        let timerInterval = null;
        let timeLeft = 30;
        
        let failedSteals = [];
        let originalAnsweringTeam = 0;

        // --- NAVIGATION ---
        document.getElementById('activate-app-btn').onclick = () => {
            document.getElementById('splash-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('splash-screen').style.display = 'none';
                const intro = document.getElementById('intro-overlay');
                intro.style.display = 'flex';
                intro.classList.add('run-sunrise-sky');
                document.getElementById('intro-sun').classList.add('run-sunrise-sun');
                setTimeout(() => { document.getElementById('intro-text').style.opacity = '1'; }, 2000);
            }, 1000);
        };

        document.getElementById('intro-btn').onclick = () => {
            document.getElementById('intro-overlay').style.display = 'none';
            showScreen('team-select-screen');
        };

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
            document.getElementById('game-container').style.display = 'none';
            document.getElementById(id).style.display = 'flex';
        }

        function goBackToSplash() {
            showScreen('');
            document.getElementById('splash-screen').style.display = 'flex';
            document.getElementById('splash-screen').style.opacity = '1';
        }

        function backToMenu() {
            showScreen('menu-screen');
        }

        function setTeams(n) {
            gameState.numTeams = n;
            renderGameList();
            showScreen('menu-screen');
        }

        function renderGameList() {
            const list = document.getElementById('game-list');
            list.innerHTML = '';
            Object.keys(ALL_GAMES).forEach(key => {
                const btn = document.createElement('button');
                btn.className = 'menu-btn';
                btn.innerHTML = ALL_GAMES[key].title;
                btn.onclick = () => startJeopardy(key);
                list.appendChild(btn);
            });
        }

        // --- CORE GAME ---
        function startJeopardy(gameKey) {
            const game = ALL_GAMES[gameKey];
            document.getElementById('current-game-title').innerText = game.title.toUpperCase();
            document.getElementById('menu-screen').style.display = 'none';
            document.getElementById('game-container').style.display = 'flex';
            
            const theme = uniformThemes[Math.floor(Math.random() * uniformThemes.length)];
            document.documentElement.style.setProperty('--board-theme', theme);

            gameState.scores = [0, 0, 0, 0];
            gameState.teamNames = ["TEAM 1", "TEAM 2", "TEAM 3", "TEAM 4"];
            gameState.currentTeam = 0;
            gameState.correctCount = 0;
            gameState.answeredTotal = 0;

            const ddCount = gameState.numTeams === 4 ? 2 : 1;
            gameState.dailyDoubles = [];
            while(gameState.dailyDoubles.length < ddCount) {
                let r = Math.floor(Math.random() * 25);
                if(!gameState.dailyDoubles.includes(r)) gameState.dailyDoubles.push(r);
            }

            setupScoreboard();
            setupBoard(game.data);
            updateUI();
        }

        function setupScoreboard() {
            const container = document.getElementById('scoreboard');
            container.innerHTML = '';
            for (let i = 0; i < gameState.numTeams; i++) {
                const div = document.createElement('div');
                div.id = `team-box-${i}`;
                div.className = `team-scoreboard ${i === gameState.currentTeam ? 'active' : ''}`;
                
                div.innerHTML = `
                    <div class="flex justify-center w-full mb-1">
                        <button id="turn-btn-${i}" onclick="setCurrentTeam(${i})" class="w-full transition-colors"></button>
                    </div>
                    <input type="text" id="name-input-${i}" class="team-name-input" value="${gameState.teamNames[i]}" onchange="updateTeamName(${i}, this.value)">
                    <input type="number" id="score-input-${i}" class="team-score-input" value="${gameState.scores[i]}" onchange="updateScore(${i}, this.value)">
                `;
                container.appendChild(div);
            }
        }

        function updateTeamName(index, val) { gameState.teamNames[index] = val; }
        
        function updateScore(index, val) { 
            gameState.scores[index] = Math.max(0, parseInt(val) || 0); 
            updateUI();
        }

        // Host manually setting the team turn from the scoreboard button
        function setCurrentTeam(index) {
            document.getElementById(`team-box-${gameState.currentTeam}`).classList.remove('active');
            gameState.currentTeam = index;
            originalAnsweringTeam = index; // Reset the logical base for turn order 
            gameState.correctCount = 0;
            document.getElementById(`team-box-${gameState.currentTeam}`).classList.add('active');
            updateUI();
        }

        function setupBoard(data) {
            const board = document.getElementById('jeopardy-board');
            board.innerHTML = '';
            const categories = Object.keys(data);
            
            categories.forEach(cat => {
                const cell = document.createElement('div');
                cell.className = 'category-cell';
                cell.innerText = cat;
                board.appendChild(cell);
            });

            let qIdx = 0;
            [100, 200, 300, 400, 500].forEach(val => {
                categories.forEach(cat => {
                    const qData = data[cat][val];
                    const cell = document.createElement('div');
                    cell.className = 'question-cell';
                    cell.innerText = `$${val}`;
                    const currentIdx = qIdx;
                    cell.onclick = () => handleTileSelection(cat, val, qData, cell, currentIdx);
                    board.appendChild(cell);
                    qIdx++;
                });
            });
        }

        function handleTileSelection(cat, val, data, cell, idx) {
            gameState.currentCell = cell;
            gameState.currentValue = val;
            
            if (gameState.dailyDoubles.includes(idx)) {
                document.getElementById('daily-double-modal').style.display = 'flex';
                document.getElementById('submit-wager-btn').onclick = () => {
                    const wager = parseInt(document.getElementById('dd-wager-input').value) || 100;
                    gameState.currentValue = wager;
                    document.getElementById('daily-double-modal').style.display = 'none';
                    openQuestion(cat, wager, data);
                };
            } else {
                openQuestion(cat, val, data);
            }
        }

        function openQuestion(cat, val, data) {
            document.getElementById('modal-category').innerText = cat;
            document.getElementById('modal-points').innerText = `$${val}`;
            document.getElementById('modal-question-text').innerText = data.q;
            document.getElementById('modal-answer-text').innerText = data.a;
            
            document.getElementById('standard-actions').style.display = 'block';
            document.getElementById('award-actions').style.display = 'none';
            document.getElementById('steal-actions').style.display = 'none';
            document.getElementById('steal-resolution').style.display = 'none';
            
            document.getElementById('question-modal').style.display = 'flex';
            
            failedSteals = [];
            originalAnsweringTeam = gameState.currentTeam;

            timeLeft = 30;
            document.getElementById('modal-timer').innerText = timeLeft;
            startTimer();
        }

        // --- TIMER LOGIC ---
        function startTimer() {
            if(timerInterval) clearInterval(timerInterval);
            document.getElementById('timer-btn').innerText = "PAUSE";
            timerInterval = setInterval(() => {
                timeLeft--;
                if (timeLeft <= 0) {
                    timeLeft = 0;
                    stopTimer();
                }
                document.getElementById('modal-timer').innerText = timeLeft;
            }, 1000);
        }

        function stopTimer() {
            clearInterval(timerInterval);
            timerInterval = null;
            if(timeLeft > 0) document.getElementById('timer-btn').innerText = "RESUME";
            else document.getElementById('timer-btn').innerText = "0.0";
        }

        function toggleTimer() {
            if(timerInterval) stopTimer();
            else if (timeLeft > 0) startTimer();
        }

        // --- HOST ACTIONS ---
        function handleCorrectAction() {
            if (timeLeft <= 0) {
                showAwardSelection();
            } else {
                processCorrectForTeam(gameState.currentTeam);
            }
        }

        function showAwardSelection() {
            stopTimer();
            document.getElementById('standard-actions').style.display = 'none';
            const container = document.getElementById('award-team-buttons');
            container.innerHTML = '';
            
            for(let i=0; i<gameState.numTeams; i++) {
                const btn = document.createElement('button');
                btn.className = `game-btn ${i === gameState.currentTeam ? 'bg-blue-600' : 'bg-gray-600'}`;
                btn.innerText = gameState.teamNames[i];
                btn.onclick = () => processCorrectForTeam(i);
                container.appendChild(btn);
            }
            document.getElementById('award-actions').style.display = 'flex';
        }

        function cancelAwardSelection() {
            document.getElementById('award-actions').style.display = 'none';
            document.getElementById('standard-actions').style.display = 'block';
        }

        function processCorrectForTeam(teamIndex) {
            gameState.scores[teamIndex] += gameState.currentValue;
            
            if (originalAnsweringTeam === teamIndex) {
                gameState.correctCount++;
            } else {
                // Awarded to someone else, force passing turn next
                gameState.correctCount = 2; 
            }

            markCellAnswered();

            if (gameState.correctCount >= 2) {
                // Time to pass the turn sequentially relative to original answering team
                nextTurn(); 
            } else {
                // Continue streak
                document.querySelectorAll('.team-scoreboard').forEach(el => el.classList.remove('active'));
                document.getElementById(`team-box-${gameState.currentTeam}`).classList.add('active');
                updateUI();
            }
            
            closeModal();
            checkGameOver();
        }

        // --- STEAL LOGIC ---
        function processIncorrect() {
            stopTimer();
            // Deduct from the original guessing team, safely bottoming out at 0
            gameState.scores[gameState.currentTeam] = Math.max(0, gameState.scores[gameState.currentTeam] - gameState.currentValue);
            updateUI();
            
            failedSteals.push(gameState.currentTeam);
            showStealOptions();
        }

        function showStealOptions() {
            document.getElementById('standard-actions').style.display = 'none';
            document.getElementById('award-actions').style.display = 'none';
            document.getElementById('steal-resolution').style.display = 'none';
            
            const container = document.getElementById('steal-team-buttons');
            container.innerHTML = '';
            let canSteal = false;

            for (let i = 0; i < gameState.numTeams; i++) {
                if (!failedSteals.includes(i)) {
                    canSteal = true;
                    const btn = document.createElement('button');
                    btn.className = 'game-btn bg-blue-600';
                    btn.innerText = `${gameState.teamNames[i]} STEALS`;
                    btn.onclick = () => initiateSteal(i);
                    container.appendChild(btn);
                }
            }

            if (!canSteal) {
                skipSteal();
            } else {
                document.getElementById('steal-actions').style.display = 'flex';
            }
        }

        function initiateSteal(teamIndex) {
            document.getElementById('steal-actions').style.display = 'none';
            
            document.getElementById('steal-resolution-text').innerText = `${gameState.teamNames[teamIndex]} IS STEALING`;
            
            document.getElementById('steal-correct-btn').onclick = () => resolveSteal(teamIndex, true);
            document.getElementById('steal-wrong-btn').onclick = () => resolveSteal(teamIndex, false);
            document.getElementById('steal-cancel-btn').onclick = () => showStealOptions();

            document.getElementById('steal-resolution').style.display = 'flex';
        }

        function resolveSteal(teamIndex, isCorrect) {
            if (isCorrect) {
                // Steal Successful! Give points to stealer.
                gameState.scores[teamIndex] += gameState.currentValue;
                
                // Turn logic sequentially passes to team AFTER the original answering team
                markCellAnswered();
                nextTurn(); 
                closeModal();
                checkGameOver();
            } else {
                // Steal Failed! Deduct points from stealer safely.
                gameState.scores[teamIndex] = Math.max(0, gameState.scores[teamIndex] - gameState.currentValue);
                updateUI();
                
                failedSteals.push(teamIndex);
                showStealOptions();
            }
        }

        function skipSteal() {
            // No one steals. Question is done. Pass sequentially.
            markCellAnswered();
            nextTurn();
            closeModal();
            checkGameOver();
        }

        function skipQuestion() {
            stopTimer();
            // Host skips directly.
            markCellAnswered();
            nextTurn(); 
            closeModal();
            checkGameOver();
        }

        // --- GAME UTILITIES ---
        function markCellAnswered() {
            gameState.currentCell.classList.add('answered');
            gameState.answeredTotal++;
        }

        function nextTurn() {
            // ALWAYS pass the turn sequentially starting from the original answering team
            document.getElementById(`team-box-${gameState.currentTeam}`).classList.remove('active');
            
            gameState.currentTeam = (originalAnsweringTeam + 1) % gameState.numTeams;
            gameState.correctCount = 0; 
            
            document.getElementById(`team-box-${gameState.currentTeam}`).classList.add('active');
            updateUI();
        }

        function updateUI() {
            for(let i=0; i<gameState.numTeams; i++) {
                document.getElementById(`score-input-${i}`).value = gameState.scores[i];
                document.getElementById(`name-input-${i}`).value = gameState.teamNames[i];
                
                // Update the tiny turn indicator button
                const btn = document.getElementById(`turn-btn-${i}`);
                if(btn) {
                    if (i === gameState.currentTeam) {
                        btn.innerHTML = '⭐ ACTIVE TURN';
                        btn.className = 'text-[9px] font-black py-1 px-1 rounded w-full bg-black bg-opacity-20 text-white cursor-pointer';
                    } else {
                        btn.innerHTML = 'TAP TO SET TURN';
                        btn.className = 'text-[8px] font-bold py-1 px-1 rounded w-full bg-gray-200 text-gray-500 hover:bg-gray-300 cursor-pointer';
                    }
                }
            }
            document.getElementById('streak-info').innerText = `Streak: ${gameState.correctCount}/2`;
        }

        function closeModal() {
            stopTimer();
            document.getElementById('question-modal').style.display = 'none';
        }

        function checkGameOver() {
            if (gameState.answeredTotal >= gameState.totalQuestions) {
                const max = Math.max(...gameState.scores.slice(0, gameState.numTeams));
                const winIdx = gameState.scores.indexOf(max);
                document.getElementById('winner-name').innerText = gameState.teamNames[winIdx];
                document.getElementById('winner-modal').style.display = 'flex';
            }
        }
    </script>
</body>
</html>
